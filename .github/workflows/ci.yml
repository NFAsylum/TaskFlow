name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: cd TaskFlow.Api && dotnet restore

      - name: Build
        run: cd TaskFlow.Api && dotnet build --no-restore

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: cd taskflow-frontend && npm ci

      - name: Build
        run: cd taskflow-frontend && npm run build
